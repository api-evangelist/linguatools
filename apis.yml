apis:
  - aid: linguatools:collocations
    name: Linguatools Collocations API
    description: The Linguatools Collocations API returns collocations for an English query word, filtered by syntactic relation,
      minimum significance, and part of speech. Each result includes the collocate, relation type, significance score, and up
      to three example sentences. Distributed via RapidAPI.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
