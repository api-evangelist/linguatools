aid: linguatools
name: Linguatools
description: Linguatools provides language APIs including a collocations dictionary with more than 2 million English collocations,
  a sentence generator, and a multilingual disambiguator. The collocations API returns syntactically related word pairs along
  with significance scores and example sentences.
